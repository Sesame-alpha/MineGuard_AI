<!DOCTYPE html>
<html>
<head>
  <title>Mining Control Room v3</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

  <h1>⛏️ Smart Mining Control Room</h1>

  <div class="grid">

    <div>
      <h3>Live Sensors</h3>
      <p>Temp: <span id="temp">--</span> °C</p>
      <p>Gas: <span id="gas">--</span> %</p>
      <p>Rock: <span id="rock">--</span>/10</p>
    </div>

    <div>
      <h3>Status</h3>
      <h2 id="status">---</h2>
      <p id="alert">---</p>
    </div>

    <div>
      <h3>AI Prediction</h3>
      <p id="prediction">---</p>
    </div>

  </div>

  <h3>📊 Risk Trend</h3>
  <canvas id="riskChart"></canvas>

  <h3>🗺️ Mine Zones</h3>
  <div class="mine-map">
    <div class="zone" id="z1">Z1</div>
    <div class="zone" id="z2">Z2</div>
    <div class="zone" id="z3">Z3</div>
    <div class="zone" id="z4">Z4</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
